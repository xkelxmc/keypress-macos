name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Select latest Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode.app
          xcodebuild -version

      - name: Verify tag matches version.env
        run: |
          source version.env
          if [[ "$GITHUB_REF_NAME" != "v${MARKETING_VERSION}" ]]; then
            echo "Tag $GITHUB_REF_NAME does not match MARKETING_VERSION=$MARKETING_VERSION" >&2
            exit 1
          fi

      - name: Verify tag is on main
        run: |
          git fetch origin main
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "Tag $GITHUB_REF_NAME points to a commit that is not on origin/main" >&2
            exit 1
          fi

      - name: Validate changelog
        run: |
          source version.env
          ./Scripts/validate_changelog.sh "$MARKETING_VERSION"

      - name: Test
        run: swift test

      - name: Import signing certificates
        env:
          APPLE_DISTRIBUTION_CERT_P12_BASE64: ${{ secrets.APPLE_DISTRIBUTION_CERT_P12_BASE64 }}
          APPLE_DISTRIBUTION_CERT_PASSWORD: ${{ secrets.APPLE_DISTRIBUTION_CERT_PASSWORD }}
          MAC_INSTALLER_CERT_P12_BASE64: ${{ secrets.MAC_INSTALLER_CERT_P12_BASE64 }}
          MAC_INSTALLER_CERT_PASSWORD: ${{ secrets.MAC_INSTALLER_CERT_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/release.keychain-db"
          KEYCHAIN_PASSWORD=$(uuidgen)

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          echo "$APPLE_DISTRIBUTION_CERT_P12_BASE64" | base64 --decode > "$RUNNER_TEMP/dist.p12"
          security import "$RUNNER_TEMP/dist.p12" -P "$APPLE_DISTRIBUTION_CERT_PASSWORD" \
            -k "$KEYCHAIN_PATH" -T /usr/bin/codesign -T /usr/bin/productbuild
          echo "$MAC_INSTALLER_CERT_P12_BASE64" | base64 --decode > "$RUNNER_TEMP/installer.p12"
          security import "$RUNNER_TEMP/installer.p12" -P "$MAC_INSTALLER_CERT_PASSWORD" \
            -k "$KEYCHAIN_PATH" -T /usr/bin/codesign -T /usr/bin/productbuild
          rm "$RUNNER_TEMP/dist.p12" "$RUNNER_TEMP/installer.p12"

          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH" >/dev/null
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

          APP_IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" \
            | awk -F'"' '/Apple Distribution|3rd Party Mac Developer Application|Mac App Distribution/ {print $2; exit}')
          INSTALLER_IDENTITY=$(security find-identity -v "$KEYCHAIN_PATH" \
            | awk -F'"' '/3rd Party Mac Developer Installer|Mac Installer Distribution/ {print $2; exit}')
          if [[ -z "$APP_IDENTITY" ]]; then
            echo "No Apple Distribution identity found in the imported certificates" >&2
            exit 1
          fi
          if [[ -z "$INSTALLER_IDENTITY" ]]; then
            echo "No Mac Installer Distribution identity found in the imported certificates" >&2
            exit 1
          fi
          echo "App identity: $APP_IDENTITY"
          echo "Installer identity: $INSTALLER_IDENTITY"
          echo "APP_IDENTITY=$APP_IDENTITY" >> "$GITHUB_ENV"
          echo "INSTALLER_IDENTITY=$INSTALLER_IDENTITY" >> "$GITHUB_ENV"

      - name: Install provisioning profile
        env:
          PROVISIONING_PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
        run: |
          PROFILE_PATH="$RUNNER_TEMP/Keypress.provisionprofile"
          echo "$PROVISIONING_PROFILE_BASE64" | base64 --decode > "$PROFILE_PATH"
          # Fail early if the secret is not a valid profile
          security cms -D -i "$PROFILE_PATH" > /dev/null
          echo "PROVISIONING_PROFILE=$PROFILE_PATH" >> "$GITHUB_ENV"

      - name: Build and sign pkg
        run: ./Scripts/build_appstore.sh

      - name: Upload to App Store Connect
        env:
          APP_STORE_CONNECT_API_KEY_P8: ${{ secrets.APP_STORE_CONNECT_API_KEY_P8 }}
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          source version.env
          ./Scripts/upload_appstore.sh "Keypress-${MARKETING_VERSION}.pkg"

      - name: Clean up keychain
        if: always()
        run: security delete-keychain "$RUNNER_TEMP/release.keychain-db" || true
